<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Download</title>

<style>
body{
    background:#f5f6f8;
    color:#111;
    font-family:'Segoe UI',sans-serif;
    padding:15px;
}

/* CARD */
.card{
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    max-width:420px;
    margin:auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.img-box{
    position:relative;
}

img{
    width:100%;
    height:400px;
    object-fit:cover;
}

.quality{
    position:absolute;
    top:10px;
    right:10px;
    background:#111;
    color:#fff;
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
}

.content{
    padding:18px;
}

p{
    color:#555;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    background:#111;
    border:none;
    border-radius:8px;
    color:white;
    margin-top:15px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

/* POPUP */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(8px);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:#fff;
    padding:25px;
    border-radius:14px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:6px;
}

.error{
    color:red;
    font-size:14px;
}
</style>
</head>

<body>

<div class="card">

    <div class="img-box">
        <span class="quality" id="qualityTag">720p</span>
        <img id="movieImg">
    </div>

    <div class="content">
        <h2 id="movieName"></h2>

        <p>Quality: <span id="qualityText"></span></p>
        <p>Size: <span id="size"></span></p>
        <p>Format: <span id="format"></span></p>

        <button id="downloadBtn" onclick="openPopup()">Download</button>
    </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h3>Enter Key 🔑</h3>
        <input type="text" id="keyInput" placeholder="Enter key">
        <p class="error" id="errorMsg"></p>
        <button onclick="checkKey()">Submit</button>
    </div>
</div>

<script>

// ===== MOVIE DATA =====
let link = "https://cloud.jazzdrive.com.pk/share/I9Y488BQE09ZPOYO";

document.getElementById("movieName").innerText = "Dhurandar the Revenge";
document.getElementById("qualityText").innerText = "720p";
document.getElementById("qualityTag").innerText = "720p";
document.getElementById("size").innerText = "1.31GB";
document.getElementById("format").innerText = "MP4";
document.getElementById("movieImg").src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTlA52gybLs_6aq6paMSt2jaUX3Sj9sUX5wpHfmZtFKKQ&s=10";

// ===== ENCODE =====
function encode(str){
    return btoa(str);
}

// ===== KEYS (EDIT ANYTIME) =====
let keysDB = [
    {key: encode("A1B2C3"), used:false},
    {key: encode("NEWKEY1"), used:false},
    {key: encode("NEWKEY2"), used:false},
    {key: encode("MOVIE999"), used:false},
    {key: encode("VIPo2026"), used:false}
];

// ✅ FIX: ALWAYS USE LATEST KEYS
window.onload = function(){
    localStorage.setItem("keysDB", JSON.stringify(keysDB));
}

// ===== POPUP =====
function openPopup(){
    document.getElementById("popup").style.display = "flex";
}

// ===== CHECK KEY =====
function checkKey(){
    let saved = JSON.parse(localStorage.getItem("keysDB")) || [];

    let userKey = document.getElementById("keyInput").value.trim();
    let encodedKey = encode(userKey);

    let index = saved.findIndex(k => k.key === encodedKey);

    if(index === -1){
        document.getElementById("errorMsg").innerText = "Invalid Key ❌";
        return;
    }

    if(saved[index].used){
        document.getElementById("errorMsg").innerText = "Key already used ❌";
        return;
    }

    saved[index].used = true;
    localStorage.setItem("keysDB", JSON.stringify(saved));

    document.getElementById("popup").style.display = "none";

    startTimer();
}

// ===== TIMER =====
function startTimer(){
    let btn = document.getElementById("downloadBtn");
    let time = 10;

    btn.disabled = true;

    let interval = setInterval(()=>{
        btn.innerText = "Wait " + time + "s";
        time--;

        if(time < 0){
            clearInterval(interval);
            btn.innerText = "Download Now";
            btn.disabled = false;

            btn.onclick = function(){
                window.location.href = link;
            }
        }
    },1000);
}

</script>

</body>
</html>
