<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Details</title>

<style>
body{
    background:#000;
    color:white;
    font-family:'Poppins', sans-serif;
    padding:15px;
}

/* Card */
.card{
    background:#141414;
    border-radius:12px;
    overflow:hidden;
    max-width:420px;
    margin:auto;
    box-shadow:0 0 20px rgba(255,0,0,0.2);
}

/* Image */
.img-box{
    position:relative;
}

img{
    width:100%;
    height:500px;
    object-fit:cover;
}

/* Quality Tag */
.quality{
    position:absolute;
    top:10px;
    right:10px;
    background:#e50914;
    padding:6px 10px;
    border-radius:5px;
    font-size:12px;
    font-weight:bold;
}

/* Content */
.content{
    padding:15px;
}

h2{
    margin:0;
    font-size:20px;
}

.info{
    font-size:14px;
    color:#bbb;
    margin-top:5px;
}

/* Download Button */
button{
    width:100%;
    padding:12px;
    background:#e50914;
    border:none;
    border-radius:6px;
    color:white;
    font-size:16px;
    margin-top:12px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#b20710;
}

button:disabled{
    background:#555;
    cursor:not-allowed;
}
</style>
</head>

<body>

<div class="card">
    
    <div class="img-box">
        <span class="quality" id="qualityTag">HD</span>
        <img id="movieImg" src="https://via.placeholder.com/300x200">
    </div>

    <div class="content">
        <h2 id="movieName">Movie Name</h2>

        <p class="info">Quality: <span id="qualityText">HD</span></p>
        <p class="info">Size: <span id="size">1.2GB</span></p>
        <p class="info">Format: <span id="format">MP4</span></p>

        <button id="downloadBtn" onclick="startTimer()">
            Download
        </button>
    </div>

</div>

<script>

// ===== EDITABLE DATA =====
let link = "https://cloud.jazzdrive.com.pk/share/I9Y488BQE09ZPOYO";

document.getElementById("movieName").innerText = "Dhurandar the Revenge";
document.getElementById("qualityText").innerText = "720p";
document.getElementById("qualityTag").innerText = "720p";
document.getElementById("size").innerText = "1.31GB";
document.getElementById("format").innerText = "MP4";
document.getElementById("movieImg").src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTlA52gybLs_6aq6paMSt2jaUX3Sj9sUX5wpHfmZtFKKQ&s=10";

// ===== TIMER FUNCTION =====
function startTimer(){
    let btn = document.getElementById("downloadBtn");
    let time = 10;

    btn.disabled = true;

    let interval = setInterval(()=>{
        btn.innerText = "Wait " + time + "s";
        time--;

        if(time < 0){
            clearInterval(interval);
            btn.innerText = "Download Now";
            btn.disabled = false;

            btn.onclick = function(){
                window.location.href = link;
            }
        }
    },1000);
}

</script>

</body>
</html>
