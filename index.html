<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SK DRIVE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f8f9fb;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#fff;
}

/* GRID FIX */
.container{
  padding:15px;
}

/* 🔥 IMPORTANT FIX */
.grid{
  display:flex;
  flex-wrap:wrap;
  gap:15px;
}

/* CARD WIDTH = 2 PER ROW */
.card{
  width:calc(50% - 10px);
  background:#fff;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

.movie-title{
  font-weight:600;
}

.btn{
  display:block;
  margin-top:8px;
  padding:8px;
  text-align:center;
  background:#111;
  color:#fff;
  border-radius:6px;
  text-decoration:none;
}

/* MOBILE → still 2 */
@media(max-width:600px){
  .card{
    width:calc(50% - 10px);
  }
}
</style>
</head>

<body>

<div class="navbar">
  <h2>SK DRIVE</h2>
</div>

<div class="container">
  <div class="grid">

    <div class="card">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTlA52gybLs_6aq6paMSt2jaUX3Sj9sUX5wpHfmZtFKKQ&s=10">
      <div class="card-content">
        <div class="movie-title">DHURANDHAR THE REVENGE</div>
        <a href="dhur.html" class="btn">Download</a>
      </div>
</div>
    <div class="card">
      <img src="https://m.media-amazon.com/images/M/MV5BNTdlNTNjNjctYTg2MC00NTFlLTliNTctODFiZjZmNWRkYTVlXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg">
      <div class="card-content">
        <div class="movie-title">peaky blinders immortal man</div>
        <a href="peaky.html" class="btn">Download</a>
      </div>
    </div>

    
  </div>
</div>

</body>
</html>
