<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SK JAZZ DRIVE</title>

<!-- Tailwind + Fonts -->
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* ===== MOVIE CSS (UNCHANGED) ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0a0a0a;
    color:#fff;
}

header{
    background:#000;
    padding:20px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid #e50914;
}

.logo{
    font-family:'Bebas Neue',sans-serif;
    font-size:42px;
    letter-spacing:4px;
    color:#e50914;
    white-space:nowrap;
}

nav a{
    margin-left:20px;
    text-decoration:none;
    color:#fff;
    font-weight:500;
    transition:0.3s;
}

nav a:hover{
    color:#e50914;
}

.movies{
    padding:40px 5%;
}

.movies h3{
    margin-bottom:25px;
    font-size:28px;
    color:#fff;
}

.row{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.card{
    width:calc(50% - 10px);
    height:220px;
    background:linear-gradient(135deg,#1a1a1a,#111);
    border-radius:10px;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:10px;
    position:relative;
    transition:0.3s;
    box-shadow:0 4px 8px rgba(0,0,0,0.5);
    color:#fff;
    margin-bottom:20px;
}

.card:hover{
    transform:scale(1.05);
    background:linear-gradient(135deg,#e50914,#ff4d4d);
    color:#fff;
}

.card img{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:10px;
    z-index:1;
    opacity:0.7;
}

.card-content{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
}

.card-content .movie-name{
    font-weight:700;
    font-size:16px;
    color:#ff0000;
    background:rgba(0,0,0,0.6);
    padding:2px 5px;
    border-radius:3px;
}

.card-content .quality{
    font-size:12px;
    color:#ff0000;
    background:rgba(0,0,0,0.6);
    padding:2px 5px;
    border-radius:3px;
}

.download-link{
    display:inline-block;
    margin-top:5px;
    padding:5px 12px;
    background-color:#e50914;
    color:#fff;
    font-weight:600;
    text-decoration:none;
    font-size:13px;
    border-radius:5px;
    transition:0.3s;
    position:relative;
    z-index:2;
}

.download-link:hover{
    background-color:#ff4d4d;
    color:#fff;
}

footer{
    background:#000;
    padding:20px;
    text-align:center;
    border-top:2px solid #e50914;
}

footer p{
    color:#aaa;
}

/* ===== LOGIN CSS (UNCHANGED) ===== */
.login-container {
  animation: fadeInScale 0.4s ease-out forwards;
}

@keyframes fadeInScale {
  from { opacity:0; transform:scale(0.95); }
  to { opacity:1; transform:scale(1); }
}

.input-focus {
  transition: all 0.2s ease;
}

.input-focus:focus {
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
  border-color: rgb(59 130 246);
}
</style>
</head>

<body>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage" class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen flex items-center justify-center p-4">

<div class="login-container bg-white rounded-2xl shadow-xl max-w-md w-full overflow-hidden">

<div class="px-8 pt-8 pb-6 text-center border-b border-slate-100">
<div class="mx-auto w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mb-4">
<i class="fa-solid fa-shield-halved text-white text-3xl"></i>
</div>
<h1 class="text-2xl font-semibold text-slate-800">Welcome back</h1>
</div>

<div class="p-8">
<form id="login-form" class="space-y-6">

<input type="text" id="username" placeholder="Username" required class="input-focus w-full p-3 border rounded-xl">
<input type="password" id="password" placeholder="Password" required class="input-focus w-full p-3 border rounded-xl">

<button type="submit" id="login-btn" class="w-full bg-blue-600 text-white py-3 rounded-xl">
Login
</button>

<div id="error-message" class="text-red-500 text-center"></div>

</form>
</div>
</div>
</div>

<!-- ================= MOVIE PAGE ================= -->
<div id="moviePage" style="display:none;">

<header>
<div class="logo">SK JAZZ DRIVE</div>
<nav>
<a href="#">Home</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="movies">
<h3>MOVIES</h3>

<div class="row">
<div class="card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTlA52gybLs_6aq6paMSt2jaUX3Sj9sUX5wpHfmZtFKKQ&s=10">
<div class="card-content">
<span class="movie-name">Dhurandar the revenge</span>
<span class="quality">720</span>
</div>
<a href="dhur.html" class="download-link">Download</a>
</div>
</div>

</section>

<footer>
<p>© 2026 SK JAZZ DRIVE</p>
</footer>

</div>

<script>
// USERS
const users = [
  { username: "admin", password: "password123" },
  { username: "testuser", password: "testpassword" }
];

const form = document.getElementById('login-form');
const errorMessage = document.getElementById('error-message');

form.addEventListener('submit', function(e) {
  e.preventDefault();

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  const user = users.find(u => u.username === username && u.password === password);

  if(user){
    // LOGIN SUCCESS
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("moviePage").style.display = "block";
  } else {
    errorMessage.textContent = "Invalid login!";
  }
});
</script>

</body>
</html>
