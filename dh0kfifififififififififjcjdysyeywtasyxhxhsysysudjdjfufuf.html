<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Download</title>

<style>
body{
    background:#000;
    color:white;
    font-family:Arial;
    padding:15px;
}

.card{
    background:#141414;
    border-radius:12px;
    overflow:hidden;
    max-width:420px;
    margin:auto;
    box-shadow:0 0 20px rgba(255,0,0,0.2);
}

.img-box{
    position:relative;
}

img{
    width:100%;
    height:400px;
    object-fit:cover;
}

.quality{
    position:absolute;
    top:10px;
    right:10px;
    background:#e50914;
    padding:6px 10px;
    border-radius:5px;
    font-size:12px;
    font-weight:bold;
}

.content{
    padding:15px;
}

button{
    width:100%;
    padding:12px;
    background:#e50914;
    border:none;
    border-radius:6px;
    color:white;
    font-size:16px;
    margin-top:12px;
    cursor:pointer;
}

/* POPUP */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:#141414;
    padding:20px;
    border-radius:10px;
    text-align:center;
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:5px;
}

.error{
    color:red;
    font-size:14px;
}
</style>
</head>

<body>

<div class="card">

    <div class="img-box">
        <span class="quality" id="qualityTag">720p</span>
        <img id="movieImg">
    </div>

    <div class="content">
        <h2 id="movieName"></h2>

        <p>Quality: <span id="qualityText"></span></p>
        <p>Size: <span id="size"></span></p>
        <p>Format: <span id="format"></span></p>

        <button id="downloadBtn" onclick="openPopup()">Download</button>
    </div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="popup-box">
        <h3>Enter Key 🔑</h3>
        <input type="text" id="keyInput" placeholder="Enter key">
        <p class="error" id="errorMsg"></p>
        <button onclick="checkKey()">Submit</button>
    </div>
</div>

<script>

// ===== MOVIE DATA =====
let link = "https://cloud.jazzdrive.com.pk/share/I9Y488BQE09ZPOYO";

document.getElementById("movieName").innerText = "Dhurandar the Revenge";
document.getElementById("qualityText").innerText = "720p";
document.getElementById("qualityTag").innerText = "720p";
document.getElementById("size").innerText = "1.31GB";
document.getElementById("format").innerText = "MP4";
document.getElementById("movieImg").src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTlA52gybLs_6aq6paMSt2jaUX3Sj9sUX5wpHfmZtFKKQ&s=10";

// ===== SIMPLE ENCODE FUNCTION =====
function encode(str){
    return btoa(str);
}


    document.getElementById("popup").style.display = "none";

    startTimer();
}

// ===== TIMER =====
function startTimer(){
    let btn = document.getElementById("downloadBtn");
    let time = 10;

    btn.disabled = true;

    let interval = setInterval(()=>{
        btn.innerText = "Wait " + time + "s";
        time--;

        if(time < 0){
            clearInterval(interval);
            btn.innerText = "Download Now";
            btn.disabled = false;

            btn.onclick = function(){
                window.location.href = link;
            }
        }
    },1000);
}

</script>

</body>
</html>
